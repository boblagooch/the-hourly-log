<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1A3D36">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>The Hourly Log — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --cream:        #F4F9F7;
      --cream-dark:   #E5EEE9;
      --warm-white:   #F8FDFB;
      --wood-light:   #8DBDB0;
      --wood-mid:     #3D7A6C;
      --wood-dark:    #1A3D36;
      --amber:        #C9A84C;
      --sage:         #5E9B84;
      --sage-light:   #9EC8B8;
      --sage-dark:    #3D7060;
      --concern-red:  #B84A30;
      --text-primary: #182E28;
      --text-sec:     #3A5550;
      --text-muted:   #617A75;
      --border:       #BEDAD3;
      --border-focus: #3D7A6C;
      --error:        #C45C4A;
      --font-serif: 'DM Serif Display', Georgia, serif;
      --font-sans:  'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --r-sm: 8px;
      --r-md: 12px;
      --shadow-lg: 0 8px 32px rgba(26,61,54,0.14);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── Loading overlay ─────────────────────── */
    #loadingOverlay {
      position: fixed;
      top: 0; right: 0; bottom: 0; left: 0;
      background: var(--wood-dark);
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
      z-index: 999;
    }

    .loading-inner { text-align: center; }

    .loading-rule {
      width: 32px; height: 1px;
      background: var(--amber);
      margin: 0 auto 1.25rem;
    }

    .loading-title {
      font-family: var(--font-serif);
      font-size: 1.75rem;
      color: var(--cream);
      margin-bottom: 1.75rem;
    }

    .loading-dots {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      gap: 0.5rem;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
    }

    .loading-dot {
      width: 7px; height: 7px;
      background: var(--wood-light);
      border-radius: 50%;
      -webkit-animation: dotPulse 1.1s ease infinite;
      animation: dotPulse 1.1s ease infinite;
    }

    .loading-dot:nth-child(2) { -webkit-animation-delay: 0.18s; animation-delay: 0.18s; }
    .loading-dot:nth-child(3) { -webkit-animation-delay: 0.36s; animation-delay: 0.36s; }

    @-webkit-keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; -webkit-transform: scale(0.75); }
      40%            { opacity: 1;   -webkit-transform: scale(1);    }
    }
    @keyframes dotPulse {
      0%, 80%, 100% { opacity: 0.3; transform: scale(0.75); }
      40%            { opacity: 1;   transform: scale(1);    }
    }

    /* ── App shell ───────────────────────────── */
    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      background: var(--warm-white);
      box-shadow: var(--shadow-lg);
    }

    /* ── Header ─────────────────────────────── */
    .app-header {
      background: var(--wood-dark);
      padding: 1.75rem 1.25rem 1.375rem;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: flex-end;
      -ms-flex-align: flex-end;
      align-items: flex-end;
      -webkit-box-pack: justify;
      -ms-flex-pack: justify;
      justify-content: space-between;
    }

    .header-text h1 {
      font-family: var(--font-serif);
      font-size: 1.5rem;
      color: var(--cream);
      margin-bottom: 0.1rem;
    }

    .header-tag {
      font-size: 0.68rem;
      color: var(--wood-light);
      letter-spacing: 0.09em;
      text-transform: uppercase;
      font-weight: 400;
    }

    .sign-out-btn {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.18);
      color: var(--wood-light);
      font-family: var(--font-sans);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 0.875rem;
      border-radius: 20px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      min-height: 36px;
    }

    .sign-out-btn:active { opacity: 0.7; }

    /* ── Login screen ────────────────────────── */
    #loginScreen { display: none; }

    .login-body { padding: 2rem 1.5rem; }

    .login-prompt {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--text-primary);
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .form-group { margin-bottom: 1.125rem; }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.4rem;
    }

    .form-input {
      width: 100%;
      padding: 0.875rem 1rem;
      font-family: var(--font-sans);
      font-size: 1rem;
      color: var(--text-primary);
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: var(--r-sm);
      -webkit-appearance: none;
      appearance: none;
      -webkit-transition: border-color 0.18s;
      transition: border-color 0.18s;
    }

    .form-input:focus {
      outline: none;
      border-color: var(--border-focus);
      background: var(--warm-white);
    }

    .login-btn {
      width: 100%;
      min-height: 52px;
      margin-top: 1.25rem;
      padding: 1rem;
      font-family: var(--font-sans);
      font-size: 1rem;
      font-weight: 600;
      color: var(--cream);
      background: var(--wood-dark);
      border: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      -webkit-transition: opacity 0.18s;
      transition: opacity 0.18s;
    }

    .login-btn:active { opacity: 0.85; }
    .login-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .login-btn.loading { color: transparent; }

    .login-btn.loading::after {
      content: '';
      position: absolute;
      width: 20px; height: 20px;
      top: 50%; left: 50%;
      margin: -10px 0 0 -10px;
      border: 2px solid transparent;
      border-top-color: var(--cream);
      border-radius: 50%;
      -webkit-animation: spin 0.75s linear infinite;
      animation: spin 0.75s linear infinite;
    }

    @-webkit-keyframes spin { to { -webkit-transform: rotate(360deg); } }
    @keyframes spin          { to { transform: rotate(360deg); }        }

    .login-error {
      margin-top: 0.875rem;
      padding: 0.75rem 1rem;
      background: #FDF0EE;
      border: 1px solid #E8C4BC;
      border-radius: var(--r-sm);
      font-size: 0.85rem;
      color: var(--error);
      display: none;
      line-height: 1.4;
    }

    /* ── Dashboard ───────────────────────────── */
    #dashboard { display: none; }

    /* ── Stats bar ───────────────────────────── */
    .stats-bar {
      background: var(--cream-dark);
      border-bottom: 1px solid var(--border);
      padding: 0.875rem 1.25rem;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      gap: 1rem;
      -ms-flex-wrap: wrap;
      flex-wrap: wrap;
    }

    .stat-item { display: -webkit-box; display: -ms-flexbox; display: flex; -webkit-box-orient: vertical; -webkit-box-direction: normal; -ms-flex-direction: column; flex-direction: column; }

    .stat-value {
      font-size: 1.375rem;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.67rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-top: 0.2rem;
    }

    .stat-div {
      width: 1px;
      height: 28px;
      background: var(--border);
      -ms-flex-negative: 0;
      flex-shrink: 0;
    }

    .cat-counts {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -ms-flex-wrap: wrap;
      flex-wrap: wrap;
      gap: 0.625rem;
    }

    .cat-badge {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--text-sec);
    }

    .cat-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      -ms-flex-negative: 0;
      flex-shrink: 0;
    }

    /* Live indicator */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      background: var(--sage);
      border-radius: 50%;
      margin-right: 0.35rem;
      -webkit-animation: livePulse 2s ease infinite;
      animation: livePulse 2s ease infinite;
    }

    @-webkit-keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }
    @keyframes livePulse          { 0%, 100% { opacity: 1; } 50% { opacity: 0.35; } }

    .live-label {
      font-size: 0.67rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      margin-left: auto;
    }

    /* ── Filter tabs ─────────────────────────── */
    .filter-row {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border-bottom: 1px solid var(--border);
      background: var(--warm-white);
      padding: 0 0.5rem;
      scrollbar-width: none;
    }

    .filter-row::-webkit-scrollbar { display: none; }

    .filter-btn {
      -ms-flex-negative: 0;
      flex-shrink: 0;
      padding: 0.75rem 0.875rem;
      font-family: var(--font-sans);
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer;
      touch-action: manipulation;
      white-space: nowrap;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      margin-bottom: -1px;
    }

    .filter-btn.active {
      color: var(--wood-dark);
      border-bottom-color: var(--wood-mid);
      font-weight: 600;
    }

    /* ── Feed ────────────────────────────────── */
    .feed {
      padding: 1rem 1.25rem;
      padding-bottom: calc(1.5rem + env(safe-area-inset-bottom, 0px));
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-orient: vertical;
      -webkit-box-direction: normal;
      -ms-flex-direction: column;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* ── Empty state ─────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
    }

    .empty-state-title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-sec);
      margin-bottom: 0.3rem;
    }

    .empty-state-sub {
      font-size: 0.825rem;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* ── Submission card ─────────────────────── */
    .sub-card {
      background: var(--warm-white);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      overflow: hidden;
    }

    .sub-card.concern-card {
      border-left-color: var(--concern-red);
      border-left-width: 3px;
    }

    .sub-card-head {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: justify;
      -ms-flex-pack: justify;
      justify-content: space-between;
      padding: 0.875rem 1rem 0.5rem;
    }

    .sub-cat {
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      gap: 0.5rem;
    }

    .sub-icon {
      width: 28px; height: 28px;
      border-radius: 6px;
      display: -webkit-box;
      display: -ms-flexbox;
      display: flex;
      -webkit-box-align: center;
      -ms-flex-align: center;
      align-items: center;
      -webkit-box-pack: center;
      -ms-flex-pack: center;
      justify-content: center;
      -ms-flex-negative: 0;
      flex-shrink: 0;
      color: #fff;
    }

    .sub-icon svg { width: 14px; height: 14px; }

    .sub-cat-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-sec);
    }

    .sub-time {
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
      -ms-flex-negative: 0;
      flex-shrink: 0;
      margin-left: 0.5rem;
    }

    .sub-body {
      padding: 0 1rem 0.875rem;
    }

    .sub-field { margin-top: 0.5rem; }

    .sub-field-label {
      font-size: 0.67rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .sub-field-value {
      font-size: 0.875rem;
      color: var(--text-primary);
      line-height: 1.45;
      margin-top: 0.1rem;
    }

    .sub-field-value.anon {
      color: var(--text-muted);
      font-style: italic;
    }

    .mood-pill {
      display: inline-block;
      padding: 0.2rem 0.625rem;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      color: #fff;
    }

    /* ── Responsive ──────────────────────────── */
    @media (max-width: 480px) { .app { box-shadow: none; } }
    @media (min-width: 481px) { body { padding: 1rem 0; } }
  </style>
</head>
<body>

<!-- ── Loading ════════════════════════════════ -->
<div id="loadingOverlay">
  <div class="loading-inner">
    <div class="loading-rule"></div>
    <h1 class="loading-title">The Hourly Log</h1>
    <div class="loading-dots">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>
  </div>
</div>

<div class="app">

  <!-- ── Login ══════════════════════════════════ -->
  <div id="loginScreen">
    <header class="app-header">
      <div class="header-text">
        <h1>The Hourly Log</h1>
        <p class="header-tag">Admin Access</p>
      </div>
    </header>
    <div class="login-body">
      <p class="login-prompt">Sign in to view submissions</p>
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="loginEmail">Email</label>
          <input class="form-input" type="email" id="loginEmail" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPassword">Password</label>
          <input class="form-input" type="password" id="loginPassword" autocomplete="current-password">
        </div>
        <button class="login-btn" type="submit" id="loginBtn">Sign In</button>
        <div class="login-error" id="loginError"></div>
      </form>
    </div>
  </div>

  <!-- ── Dashboard ══════════════════════════════ -->
  <div id="dashboard">
    <header class="app-header">
      <div class="header-text">
        <h1>The Hourly Log</h1>
        <p class="header-tag">Submissions</p>
      </div>
      <button class="sign-out-btn" id="signOutBtn" type="button">Sign Out</button>
    </header>

    <div class="stats-bar">
      <div class="stat-item">
        <span class="stat-value" id="statTotal">—</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat-div"></div>
      <div class="stat-item">
        <span class="stat-value" id="statToday">—</span>
        <span class="stat-label">Today</span>
      </div>
      <div class="stat-div"></div>
      <div class="cat-counts" id="catCounts"></div>
      <span class="live-label"><span class="live-dot"></span>Live</span>
    </div>

    <div class="filter-row">
      <button class="filter-btn active" data-filter="all"        type="button">All</button>
      <button class="filter-btn"        data-filter="shoutout"   type="button">Shout-Outs</button>
      <button class="filter-btn"        data-filter="shift"      type="button">Shifts</button>
      <button class="filter-btn"        data-filter="suggestion" type="button">Suggestions</button>
      <button class="filter-btn"        data-filter="concern"    type="button">Concerns</button>
    </div>

    <div class="feed" id="feed"></div>
  </div>

</div><!-- .app -->

  function $el(id) { return document.getElementById(id); }

  function esc(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatTime(iso) {
    try {
      var d    = new Date(iso);
      var diff = Date.now() - d.getTime();
      var mins  = Math.floor(diff / 60000);
      var hours = Math.floor(diff / 3600000);
      var days  = Math.floor(diff / 86400000);
      if (mins  < 1)  return 'Just now';
      if (mins  < 60) return mins  + 'm ago';
      if (hours < 24) return hours + 'h ago';
      if (days === 1) return 'Yesterday';
      if (days  < 7)  return days  + 'd ago';
      var mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      return mo[d.getMonth()] + ' ' + d.getDate();
    } catch (e) { return ''; }
  }

  function isToday(iso) {
    try {
      var d = new Date(iso), t = new Date();
      return d.getFullYear() === t.getFullYear() &&
             d.getMonth()    === t.getMonth()    &&
             d.getDate()     === t.getDate();
    } catch (e) { return false; }
  }

  function field(label, value, extraClass) {
    if (!value && value !== 0) return '';
    return '<div class="sub-field">' +
      '<div class="sub-field-label">' + label + '</div>' +
      '<div class="sub-field-value' + (extraClass ? ' ' + extraClass : '') + '">' + esc(value) + '</div>' +
    '</div>';
  }

  /* ═══════════════════════════════════════════
     VIEW SWITCHING
  ═══════════════════════════════════════════ */
  function showView(name) {
    $el('loadingOverlay').style.display = 'none';
    $el('loginScreen').style.display    = name === 'login'     ? 'block' : 'none';
    $el('dashboard').style.display      = name === 'dashboard' ? 'block' : 'none';
  }

  /* ═══════════════════════════════════════════
     RENDER: STATS
  ═══════════════════════════════════════════ */
  function renderStats() {
    var total = allSubmissions.length;
    var today = 0;
    var cats = { shoutout: 0, shift: 0, suggestion: 0, concern: 0 };
    var i, s;

    for (i = 0; i < allSubmissions.length; i++) {
      s = allSubmissions[i];
      if (isToday(s.timestamp)) { today++; }
      if (cats.hasOwnProperty(s.category)) { cats[s.category]++; }
    }

    $el('statTotal').textContent = total;
    $el('statToday').textContent = today;

    var keys = ['shoutout', 'shift', 'suggestion', 'concern'];
    var names = { shoutout: 'Shout-Outs', shift: 'Shifts', suggestion: 'Suggestions', concern: 'Concerns' };
    var html = '';
    for (i = 0; i < keys.length; i++) {
      var k = keys[i];
      html += '<div class="cat-badge">' +
        '<div class="cat-dot" style="background:' + CAT_COLORS[k] + '"></div>' +
        '<span>' + cats[k] + ' ' + names[k] + '</span>' +
      '</div>';
    }
    $el('catCounts').innerHTML = html;
  }

  /* ═══════════════════════════════════════════
     RENDER: CARD BODY
  ═══════════════════════════════════════════ */
  function renderBody(data) {
    var html = '';
    var cat  = data.category;

    if (cat === 'shoutout') {
      html += field('Recognized', data.who);
      html += field('For', data.what);
      html += field('From', data.name || 'Anonymous', data.name ? '' : 'anon');

    } else if (cat === 'shift') {
      if (data.mood) {
        var mColor = MOOD_COLORS[data.mood] || '#537878';
        var mText  = MOOD_LABELS[data.mood]  || data.mood;
        html += '<div class="sub-field"><div class="sub-field-label">Mood</div>' +
                '<div style="margin-top:0.125rem;"><span class="mood-pill" style="background:' + mColor + '">' + esc(mText) + '</span></div></div>';
      }
      html += field('Notes', data.notes);
      html += field('Shout-Out Given', data.shoutout);
      html += field('From', data.name || 'Anonymous', data.name ? '' : 'anon');

    } else if (cat === 'suggestion') {
      html += field('Area', SUGGESTION_AREAS[data.area] || data.area);
      html += field('Suggestion', data.suggestion);
      html += field('From', data.name || 'Anonymous', data.name ? '' : 'anon');

    } else if (cat === 'concern') {
      html += field('Type', CONCERN_TYPES[data.type] || data.type);
      html += field('Frequency', CONCERN_PATTERNS[data.pattern] || data.pattern);
      html += field('When', data.when);
      html += field('Who was involved', data.who);
      html += field('What happened', data.what);

      if (data.contactPreference === 'yes') {
        html += field('Contact preference', 'Wants to be contacted');
        html += field('Name', data.name);
        html += field('Contact info', data.contactInfo);
      } else if (data.contactPreference === 'no') {
        html += field('Contact preference', 'Prefers to stay anonymous');
      } else if (data.contactPreference === 'not-answered') {
        html += field('Contact preference', 'Not answered');
        html += field('Name', data.name);
        html += field('Contact info', data.contactInfo);
      }
    }

    return html;
  }

  /* ═══════════════════════════════════════════
     RENDER: SINGLE CARD
  ═══════════════════════════════════════════ */
  function renderCard(data) {
    var cat    = data.category || 'unknown';
    var color  = CAT_COLORS[cat]  || '#537878';
    var icon   = CAT_ICONS[cat]   || '';
    var label  = CAT_LABELS[cat]  || cat;
    var time   = formatTime(data.timestamp);
    var body   = renderBody(data);
    var isConcern = cat === 'concern';

    return '<div class="sub-card' + (isConcern ? ' concern-card' : '') + '">' +
      '<div class="sub-card-head">' +
        '<div class="sub-cat">' +
          '<div class="sub-icon" style="background:' + color + '">' + icon + '</div>' +
          '<span class="sub-cat-label">' + esc(label) + '</span>' +
        '</div>' +
        '<span class="sub-time">' + esc(time) + '</span>' +
      '</div>' +
      (body ? '<div class="sub-body">' + body + '</div>' : '') +
    '</div>';
  }

  /* ═══════════════════════════════════════════
     RENDER: FEED
  ═══════════════════════════════════════════ */
  function renderFeed() {
    var feed     = $el('feed');
    var filtered = [];
    var i;

    for (i = 0; i < allSubmissions.length; i++) {
      if (currentFilter === 'all' || allSubmissions[i].category === currentFilter) {
        filtered.push(allSubmissions[i]);
      }
    }

    if (filtered.length === 0) {
      feed.innerHTML =
        '<div class="empty-state">' +
          '<p class="empty-state-title">No submissions yet</p>' +
          '<p class="empty-state-sub">' +
            (currentFilter === 'all'
              ? 'Submissions will appear here in real time as staff complete the form.'
              : 'No submissions in this category yet.') +
          '</p>' +
        '</div>';
      return;
    }

    var html = '';
    for (i = 0; i < filtered.length; i++) {
      html += renderCard(filtered[i]);
    }
    feed.innerHTML = html;
  }

  /* ═══════════════════════════════════════════
     FIRESTORE LISTENER
  ═══════════════════════════════════════════ */
  function startListening() {
    if (unsubscribe) { unsubscribe(); }
    unsubscribe = db.collection('submissions')
      .orderBy('timestamp', 'desc')
      .limit(250)
      .onSnapshot(function(snapshot) {
        var list = [];
        snapshot.forEach(function(doc) {
          var d  = doc.data();
          d._id  = doc.id;
          list.push(d);
        });
        allSubmissions = list;
        renderStats();
        renderFeed();
      }, function(err) {
        console.error('Firestore error:', err);
      });
  }

  function stopListening() {
    if (unsubscribe) { unsubscribe(); unsubscribe = null; }
    allSubmissions = [];
  }

  /* ═══════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════ */
  document.addEventListener('DOMContentLoaded', function() {

    /* Auth state observer */
    auth.onAuthStateChanged(function(user) {
      if (user) {
        showView('dashboard');
        startListening();
      } else {
        stopListening();
        showView('login');
      }
    });

    /* Safety timeout — hide loading screen if auth hangs */
    setTimeout(function() {
      if ($el('loadingOverlay').style.display !== 'none') {
        showView('login');
      }
    }, 8000);

    /* Login form */
    $el('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      var btn      = $el('loginBtn');
      var errDiv   = $el('loginError');
      var email    = $el('loginEmail').value.trim();
      var password = $el('loginPassword').value;

      if (!email || !password) return;

      btn.classList.add('loading');
      btn.disabled = true;
      errDiv.style.display = 'none';

      auth.signInWithEmailAndPassword(email, password)
        .then(function() { /* onAuthStateChanged handles transition */ })
        ['catch'](function(err) {
          btn.classList.remove('loading');
          btn.disabled = false;
          var msg = 'Sign in failed. Check your email and password.';
          if (err.code === 'auth/invalid-email')     { msg = 'Invalid email address.'; }
          if (err.code === 'auth/wrong-password')    { msg = 'Incorrect password.'; }
          if (err.code === 'auth/user-not-found')    { msg = 'No account found with that email.'; }
          if (err.code === 'auth/too-many-requests') { msg = 'Too many attempts. Please try again later.'; }
          if (err.code === 'auth/invalid-credential'){ msg = 'Invalid credentials. Check your email and password.'; }
          errDiv.textContent    = msg;
          errDiv.style.display  = 'block';
        });
    });

    /* Sign out */
    $el('signOutBtn').addEventListener('click', function() {
      auth.signOut();
    });

    /* Filter tabs */
    var filterBtns = document.querySelectorAll('.filter-btn');
    Array.prototype.forEach.call(filterBtns, function(btn) {
      btn.addEventListener('click', function() {
        currentFilter = btn.getAttribute('data-filter');
        Array.prototype.forEach.call(filterBtns, function(b) {
          b.classList.remove('active');
        });
        btn.classList.add('active');
        renderFeed();
      });
    });

  }); /* end DOMContentLoaded */
</script>
</body>
</html>
